services:
  qdrant:
    image: 'qdrant/qdrant:latest'
    container_name: 'board-qdrant'
    ports:
      - '6334:6334'
      - '6333:6333'

  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'